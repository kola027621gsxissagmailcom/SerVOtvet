<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SerVOtvet - волна ответов 🌊</title>
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #030303;
            color: #e9f1f7;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== ВОЛНЫ ===== */
        .mega-wave {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(0, 150, 255, 0.4) 0%, 
                rgba(0, 200, 255, 0.3) 30%, 
                rgba(100, 200, 255, 0.2) 60%, 
                transparent 100%);
            transform: translateX(-100%) skewX(-15deg);
            z-index: 9999;
            pointer-events: none;
            animation: megaWave 30s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            filter: blur(3px);
        }

        @keyframes megaWave {
            0% { transform: translateX(-100%) skewX(-15deg); opacity: 0; }
            10% { opacity: 0.8; }
            25% { transform: translateX(100%) skewX(-15deg); opacity: 0.6; }
            30% { opacity: 0; }
            100% { transform: translateX(100%) skewX(-15deg); opacity: 0; }
        }

        .small-waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%230066cc" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-repeat: repeat-x;
            animation: smallWave 8s linear infinite;
            z-index: -1;
            opacity: 0.3;
        }

        @keyframes smallWave {
            0% { background-position: 0 0; }
            100% { background-position: 1440px 0; }
        }

        /* ===== КОНТЕЙНЕР ===== */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* ===== ШАПКА ===== */
        header {
            background: #1a1a1b;
            border: 1px solid #343536;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 10px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo h1 {
            font-size: 2em;
            color: #00aaff;
            text-shadow: 0 0 10px rgba(0,170,255,0.3);
        }

        .logo p {
            font-size: 0.9em;
            color: #818384;
        }

        .auth-buttons button, .user-info button {
            background: transparent;
            border: 1px solid #00aaff;
            color: #00aaff;
            padding: 8px 20px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .auth-buttons button:hover, .user-info button:hover {
            background: #00aaff;
            color: #030303;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            color: #00aaff;
            font-weight: 600;
        }

        /* ===== КНОПКА НОВОГО ПОСТА ===== */
        .new-post-btn {
            background: #00aaff;
            color: #030303;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100%;
            transition: all 0.2s;
            border: 1px solid #00aaff;
        }

        .new-post-btn:hover {
            background: transparent;
            color: #00aaff;
        }

        /* ===== ПОСТЫ ===== */
        .posts {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .post {
            background: #1a1a1b;
            border: 1px solid #343536;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s;
            display: flex;
            gap: 16px;
            position: relative;
        }

        .post:hover {
            border-color: #00aaff;
            box-shadow: 0 0 15px rgba(0,170,255,0.2);
        }

        .post.pinned {
            border-left: 4px solid #ffd700;
            background: #1a2a2b;
        }

        .post.locked {
            opacity: 0.8;
        }

        .vote-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 40px;
            color: #818384;
            font-weight: 600;
        }

        .vote-arrow {
            color: #818384;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .vote-arrow:hover {
            color: #00aaff;
        }

        .post-content {
            flex: 1;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #818384;
        }

        .post-title {
            font-size: 1.3em;
            font-weight: 500;
            color: #e9f1f7;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .post-title:hover {
            color: #00aaff;
        }

        .post-author {
            color: #00aaff;
            font-weight: 600;
        }

        .post-content-preview {
            color: #818384;
            margin: 8px 0;
            line-height: 1.4;
        }

        .post-meta {
            color: #818384;
            font-size: 0.85em;
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .post-badges {
            display: flex;
            gap: 5px;
        }

        .badge {
            font-size: 0.8em;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .badge.pinned {
            background: #ffd700;
            color: #030303;
        }

        .badge.locked {
            background: #ff4444;
            color: white;
        }

        /* ===== МОДАЛЬНЫЕ ОКНА ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a1b;
            border: 1px solid #343536;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-content h2 {
            color: #00aaff;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            background: #030303;
            border: 1px solid #343536;
            border-radius: 6px;
            color: #e9f1f7;
            font-size: 15px;
        }

        .modal-content textarea {
            min-height: 120px;
            resize: vertical;
        }

        .modal-content button {
            background: #00aaff;
            color: #030303;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .modal-content button:hover {
            background: transparent;
            border: 1px solid #00aaff;
            color: #00aaff;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: #818384;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close:hover {
            color: #00aaff;
        }

        /* ===== КОММЕНТАРИИ (ИСПРАВЛЕНО) ===== */
        .comments-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #343536;
        }

        .comment {
            background: #030303;
            border: 1px solid #343536;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #818384;
        }

        .comment-header strong {
            color: #00aaff;
        }

        .add-comment {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: center;
        }

        .add-comment input {
            flex: 1;
            padding: 12px 15px;
            background: #030303;
            border: 1px solid #343536;
            border-radius: 20px;
            color: #e9f1f7;
            font-size: 14px;
        }

        .add-comment button {
            width: 100px;
            background: #00aaff;
            color: #030303;
            border: none;
            padding: 12px 0;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .add-comment button:hover {
            background: transparent;
            border: 1px solid #00aaff;
            color: #00aaff;
        }

        /* ===== АДМИН-ПАНЕЛЬ ===== */
        .admin-panel {
            padding: 20px;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #030303;
            border: 1px solid #343536;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2em;
            color: #00aaff;
            font-weight: bold;
        }

        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .admin-tab {
            background: #030303;
            border: 1px solid #343536;
            color: #e9f1f7;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .admin-tab:hover,
        .admin-tab.active {
            background: #00aaff;
            color: #030303;
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th,
        .admin-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #343536;
        }

        .admin-table th {
            color: #00aaff;
        }

        .admin-btn {
            background: #00aaff;
            color: #030303;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin: 2px;
        }

        .admin-btn.small {
            padding: 4px 8px;
            font-size: 11px;
        }

        .admin-btn.danger {
            background: #ff4444;
            color: white;
        }

        .admin-btn.warning {
            background: #ffaa00;
            color: #030303;
        }

        .log-entry {
            background: #030303;
            border: 1px solid #343536;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .log-time {
            color: #00aaff;
            font-weight: bold;
        }

        /* ===== ИНДИКАТОР ОБНОВЛЕНИЯ ===== */
        .update-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #00aaff;
            color: #030303;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10000;
        }

        .update-indicator.show {
            opacity: 1;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #00aaff;
        }
    </style>
</head>
<body>
    <div class="mega-wave"></div>
    <div class="small-waves"></div>
    <div class="update-indicator" id="updateIndicator">🌊 Обновлено</div>

    <div class="container">
        <header>
            <div class="logo">
                <h1>🌊 SerVOtvet</h1>
                <p>reddit волн</p>
            </div>
            <div class="auth-buttons" id="authButtons">
                <button onclick="showModal('loginModal')">Войти</button>
                <button onclick="showModal('registerModal')">Регистрация</button>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <span>🏄 <span id="currentUsername"></span></span>
                <button onclick="logout()">Выйти</button>
            </div>
        </header>

        <main id="mainContent">
            <div class="loading">🌊 Загружаем волны...</div>
        </main>
    </div>

    <!-- МОДАЛЬНЫЕ ОКНА -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('loginModal')">&times;</span>
            <h2>🌊 Вход</h2>
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="login()">Войти</button>
        </div>
    </div>

    <div class="modal" id="registerModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('registerModal')">&times;</span>
            <h2>📝 Регистрация</h2>
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
        </div>
    </div>

    <div class="modal" id="newPostModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('newPostModal')">&times;</span>
            <h2>🌊 Новая волна</h2>
            <input type="text" id="postTitle" placeholder="Заголовок">
            <textarea id="postContent" placeholder="Текст вопроса..."></textarea>
            <button onclick="createPost()">Опубликовать</button>
        </div>
    </div>

    <div class="modal" id="viewPostModal">
        <div class="modal-content" style="max-width: 700px;">
            <span class="close" onclick="closeModal('viewPostModal')">&times;</span>
            <div id="postViewContent"></div>
        </div>
    </div>

    <div class="modal" id="editPostModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editPostModal')">&times;</span>
            <h2>✏️ Редактировать пост</h2>
            <input type="text" id="editPostTitle" placeholder="Заголовок">
            <textarea id="editPostContent" placeholder="Текст..."></textarea>
            <button onclick="updatePost()">Сохранить</button>
        </div>
    </div>

    <script>
        // ============================================
        // НАСТРОЙКИ
        // ============================================
        const API_URL = 'https://servotvet.eu.pythonanywhere.com/api';
        const ADMIN_EMAIL = 'kola08527@gmail.com';
        
        // ============================================
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================
        let currentUser = null;
        let lastPostCount = 0;
        let postsData = [];
        let currentEditPostId = null;
        let updateIndicator = document.getElementById('updateIndicator');

        // ============================================
        // ЗАГРУЗКА ПРИ СТАРТЕ
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadPosts();
            setInterval(checkForUpdates, 2000);
        });

        // ============================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function isAdmin() {
            return currentUser && (currentUser.username === ADMIN_EMAIL || currentUser.is_admin);
        }

        // ============================================
        // АВТОРИЗАЦИЯ
        // ============================================
        function checkAuth() {
            const savedUser = localStorage.getItem('servotvet_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('authButtons').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('currentUsername').textContent = currentUser.username;
                
                if (isAdmin()) {
                    addAdminButton();
                }
            }
        }

        function addAdminButton() {
            const userInfo = document.getElementById('userInfo');
            if (!document.getElementById('adminBtn')) {
                const adminBtn = document.createElement('button');
                adminBtn.id = 'adminBtn';
                adminBtn.innerHTML = '🔧 Админ';
                adminBtn.onclick = showAdminPanel;
                adminBtn.style.marginLeft = '10px';
                adminBtn.style.background = '#ff4444';
                userInfo.appendChild(adminBtn);
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            if (!username || !password) {
                alert('❌ Заполни все поля!');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Регистрация успешна! Теперь войди.');
                    closeModal('registerModal');
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ Ошибка подключения к серверу!');
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!username || !password) {
                alert('❌ Заполни все поля!');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentUser = data.user;
                    localStorage.setItem('servotvet_user', JSON.stringify(currentUser));
                    
                    document.getElementById('authButtons').style.display = 'none';
                    document.getElementById('userInfo').style.display = 'flex';
                    document.getElementById('currentUsername').textContent = currentUser.username;
                    
                    closeModal('loginModal');
                    
                    if (isAdmin()) {
                        addAdminButton();
                    }
                    
                    loadPosts();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ Ошибка подключения к серверу!');
            }
        }

        function logout() {
            localStorage.removeItem('servotvet_user');
            currentUser = null;
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'none';
            loadPosts();
        }

        // ============================================
        // РАБОТА С ПОСТАМИ
        // ============================================
  async function loadPosts() {
    const mainContent = document.getElementById('mainContent');
    mainContent.innerHTML = '<div class="loading">🌊 Загружаем волны...</div>';

    try {
        const response = await fetch(`${API_URL}/posts`);
        
        if (!response.ok) {
            throw new Error(`HTTP ошибка! статус: ${response.status}`);
        }
        
        const data = await response.json();
        
        // ✅ ЗАЩИТА: проверяем, что data - массив
        const posts = Array.isArray(data) ? data : [];
        
        if (!Array.isArray(data)) {
            console.warn('Сервер вернул не массив. Вот что пришло:', data);
            // Если пришла ошибка, показываем её
            if (data.error) {
                mainContent.innerHTML = `<div class="loading">❌ Ошибка сервера: ${data.error}</div>`;
                return;
            }
        }
        
        postsData = posts;
        lastPostCount = posts.length;

        let html = '';
        
        if (currentUser) {
            html += `<button class="new-post-btn" onclick="showModal('newPostModal')">➕ СОЗДАТЬ ПОСТ</button>`;
        }

        if (posts.length === 0) {
            html += '<div class="loading">📭 Пока нет постов. Будь первым!</div>';
        } else {
            html += '<div class="posts">';
            posts.forEach((post) => {
                const postClass = `post ${post.is_pinned ? 'pinned' : ''} ${post.is_locked ? 'locked' : ''}`;
                
                html += `
                    <div class="${postClass}" data-post-id="${post.id}">
                        <div class="vote-side">
                            <div class="vote-arrow">▲</div>
                            <div>${Math.floor(Math.random() * 100)}</div>
                            <div class="vote-arrow">▼</div>
                        </div>
                        <div class="post-content">
                            <div class="post-header">
                                <span class="post-author">🏄 ${escapeHtml(post.username)}</span>
                                <span>•</span>
                                <span>${new Date(post.created_at).toLocaleString('ru-RU')}</span>
                                <div class="post-badges">
                                    ${post.is_pinned ? '<span class="badge pinned">📌 Закреплено</span>' : ''}
                                    ${post.is_locked ? '<span class="badge locked">🔒 Закрыто</span>' : ''}
                                </div>
                            </div>
                            <div class="post-title" onclick="viewPost(${post.id})">
                                ${escapeHtml(post.title)}
                            </div>
                            <div class="post-content-preview">
                                ${escapeHtml(post.content.substring(0, 150))}${post.content.length > 150 ? '...' : ''}
                            </div>
                            <div class="post-meta">
                                <span>💬 <a href="#" onclick="viewPost(${post.id}); return false;">${post.comments_count || 0} комментариев</a></span>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
        }

        mainContent.innerHTML = html;
    } catch (error) {
        console.error('ДЕТАЛЬНАЯ ОШИБКА:', error);
        mainContent.innerHTML = `<div class="loading">❌ Ошибка: ${error.message}<br>Статус сервера: ${error.status || 'неизвестен'}</div>`;
    }
}

        async function checkForUpdates() {
            try {
                const response = await fetch(`${API_URL}/posts`);
                const posts = await response.json();
                
                if (posts.length !== lastPostCount && lastPostCount !== 0) {
                    updateIndicator.classList.add('show');
                    setTimeout(() => {
                        updateIndicator.classList.remove('show');
                    }, 2000);
                    loadPosts();
                }
                
                lastPostCount = posts.length;
            } catch (error) {
                console.log('Ошибка проверки обновлений:', error);
            }
        }

        async function createPost() {
            if (!currentUser) {
                alert('❌ Сначала войди!');
                return;
            }

            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();

            if (!title || !content) {
                alert('❌ Заполни все поля!');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/posts`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        title,
                        content,
                        user_id: currentUser.id,
                        username: currentUser.username
                    })
                });

                const data = await response.json();

                if (data.success) {
                    closeModal('newPostModal');
                    document.getElementById('postTitle').value = '';
                    document.getElementById('postContent').value = '';
                    loadPosts();
                    
                    updateIndicator.classList.add('show');
                    setTimeout(() => {
                        updateIndicator.classList.remove('show');
                    }, 2000);
                }
            } catch (error) {
                alert('❌ Ошибка: ' + error);
            }
        }

        async function viewPost(postId) {
            try {
                const postsResponse = await fetch(`${API_URL}/posts`);
                const posts = await postsResponse.json();
                const post = posts.find(p => p.id === postId);
                
                const commentsResponse = await fetch(`${API_URL}/comments/${postId}`);
                const comments = await commentsResponse.json();

                let html = `
                    <h2 style="color: #00aaff;">${escapeHtml(post.title)}</h2>
                    <p style="color: #818384;">
                        <small>Автор: 🏄 ${escapeHtml(post.username)} | ${new Date(post.created_at).toLocaleString('ru-RU')}</small>
                        ${post.is_locked ? '<span style="margin-left: 10px; color: #ff4444;">🔒 Закрыто</span>' : ''}
                    </p>
                    <div style="margin: 20px 0; padding: 15px; background: #030303; border: 1px solid #343536; border-radius: 6px;">
                        ${escapeHtml(post.content).replace(/\n/g, '<br>')}
                    </div>
                    
                    <h3 style="color: #00aaff; margin: 20px 0;">Комментарии (${comments.length})</h3>
                    <div id="commentsList">
                `;

                if (comments.length === 0) {
                    html += '<p style="color: #818384;">Пока нет комментариев</p>';
                } else {
                    comments.forEach(comment => {
                        html += `
                            <div class="comment" data-comment-id="${comment.id}">
                                <div class="comment-header">
                                    <strong>🏄 ${escapeHtml(comment.username)}</strong>
                                    <span>${new Date(comment.created_at).toLocaleString('ru-RU')}</span>
                                </div>
                                <div>${escapeHtml(comment.content)}</div>
                                ${currentUser && (currentUser.id === comment.user_id || isAdmin()) ? `
                                    <div style="margin-top: 5px;">
                                        <button class="admin-btn small danger" onclick="deleteComment(${comment.id})">Удалить</button>
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    });
                }

                html += '</div>';

                if (currentUser && !post.is_locked) {
                    html += `
                        <div class="add-comment">
                            <input type="text" id="newComment" placeholder="Напиши комментарий...">
                            <button onclick="addComment(${postId})">Ответить</button>
                        </div>
                    `;
                } else if (post.is_locked) {
                    html += '<p style="color: #ff4444; text-align: center;">🔒 Этот пост закрыт для комментариев</p>';
                }

                document.getElementById('postViewContent').innerHTML = html;
                showModal('viewPostModal');
            } catch (error) {
                alert('❌ Ошибка загрузки: ' + error);
            }
        }

        async function addComment(postId) {
            if (!currentUser) return;

            const content = document.getElementById('newComment').value.trim();
            if (!content) return;

            try {
                const response = await fetch(`${API_URL}/comments`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content,
                        post_id: postId,
                        user_id: currentUser.id,
                        username: currentUser.username
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('newComment').value = '';
                    viewPost(postId);
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ Ошибка: ' + error);
            }
        }

        async function deleteComment(commentId) {
            if (!confirm('Удалить комментарий?')) return;

            try {
                const response = await fetch(`${API_URL}/comments/${commentId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${currentUser.id}`
                    }
                });

                const data = await response.json();
                alert(data.message);
                if (data.success) {
                    viewPost(currentPostId); // Обновляем просмотр
                }
            } catch (error) {
                alert('❌ Ошибка: ' + error);
            }
        }

        function editPost(postId) {
            const post = postsData.find(p => p.id === postId);
            if (!post) return;

            currentEditPostId = postId;
            document.getElementById('editPostTitle').value = post.title;
            document.getElementById('editPostContent').value = post.content;
            showModal('editPostModal');
        }

        // ============================================
        // АДМИН-ФУНКЦИИ
        // ============================================
        async function showAdminPanel() {
            if (!isAdmin()) {
                alert('Только для админа!');
                return;
            }

            // Получаем статистику
            const postsResponse = await fetch(`${API_URL}/posts`);
            const posts = await postsResponse.json();
            
            const usersResponse = await fetch(`${API_URL}/admin/users`, {
                headers: {
                    'Authorization': `Bearer ${currentUser.id}`
                }
            });
            const users = await usersResponse.json();

            const logsResponse = await fetch(`${API_URL}/admin/logs`, {
                headers: {
                    'Authorization': `Bearer ${currentUser.id}`
                }
            });
            const logs = await logsResponse.json();

            const adminHtml = `
                <div class="admin-panel">
                    <h2>🔧 Админ-панель</h2>
                    
                    <div class="admin-stats">
                        <div class="stat-card">
                            <div class="number">${posts.length}</div>
                            <div>Постов</div>
                        </div>
                        <div class="stat-card">
                            <div class="number">${users.length}</div>
                            <div>Пользователей</div>
                        </div>
                        <div class="stat-card">
                            <div class="number">${logs.length}</div>
                            <div>Действий</div>
                        </div>
                    </div>

                    <div class="admin-tabs">
                        <div class="admin-tab active" onclick="switchAdminTab('users')">👥 Пользователи</div>
                        <div class="admin-tab" onclick="switchAdminTab('posts')">📄 Посты</div>
                        <div class="admin-tab" onclick="switchAdminTab('logs')">📋 Логи</div>
                        <div class="admin-tab" onclick="switchAdminTab('database')">🗄️ База данных</div>
                    </div>

                    <div id="adminUsers" class="admin-section active">
                        <h3>Управление пользователями</h3>
                        <table class="admin-table">
                            <tr>
                                <th>ID</th>
                                <th>Имя</th>
                                <th>Дата</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                            ${users.map(user => `
                                <tr>
                                    <td>${user.id}</td>
                                    <td>${escapeHtml(user.username)}</td>
                                    <td>${new Date(user.created_at).toLocaleString()}</td>
                                    <td>
                                        ${user.is_banned ? '🔨 Забанен' : '✅ Активен'}
                                        ${user.username === ADMIN_EMAIL ? '👑 Админ' : ''}
                                    </td>
                                    <td>
                                        ${user.username !== ADMIN_EMAIL ? `
                                            <button class="admin-btn small" onclick="toggleUserBan(${user.id}, ${!user.is_banned})">
                                                ${user.is_banned ? '🔓 Разбанить' : '🔨 Забанить'}
                                            </button>
                                            <button class="admin-btn small danger" onclick="deleteUser(${user.id})">🗑️</button>
                                        ` : ''}
                                    </td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>

                    <div id="adminPosts" class="admin-section">
                        <h3>Управление постами</h3>
                        <button class="admin-btn danger" onclick="deleteAllPosts()">🗑️ Удалить ВСЕ посты</button>
                        <table class="admin-table">
                            <tr>
                                <th>ID</th>
                                <th>Заголовок</th>
                                <th>Автор</th>
                                <th>Дата</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                            ${posts.map(post => `
                                <tr>
                                    <td>${post.id}</td>
                                    <td>${escapeHtml(post.title)}</td>
                                    <td>${escapeHtml(post.username)}</td>
                                    <td>${new Date(post.created_at).toLocaleString()}</td>
                                    <td>
                                        ${post.is_pinned ? '📌' : ''}
                                        ${post.is_locked ? '🔒' : ''}
                                    </td>
                                    <td>
                                        <button class="admin-btn small" onclick="pinPost(${post.id}, ${!post.is_pinned})">
                                            ${post.is_pinned ? '📌 Открепить' : '📌 Закрепить'}
                                        </button>
                                        <button class="admin-btn small" onclick="lockPost(${post.id}, ${!post.is_locked})">
                                            ${post.is_locked ? '🔒 Открыть' : '🔒 Закрыть'}
                                        </button>
                                        <button class="admin-btn small danger" onclick="deletePost(${post.id})">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>

                    <div id="adminLogs" class="admin-section">
                        <h3>Логи действий</h3>
                        ${logs.map(log => `
                            <div class="log-entry">
                                <span class="log-time">[${new Date(log.created_at).toLocaleString()}]</span>
                                <strong>${escapeHtml(log.admin_name)}</strong>
                                ${log.action} 
                                ${log.target_type} 
                                ${log.target_id ? `#${log.target_id}` : ''}
                                ${log.details ? `: ${log.details}` : ''}
                            </div>
                        `).join('')}
                    </div>

                    <div id="adminDatabase" class="admin-section">
                        <h3>Работа с JSON</h3>
                        <button class="admin-btn" onclick="exportJSON()">📤 Экспорт JSON</button>
                        <button class="admin-btn warning" onclick="importJSON()">📥 Импорт JSON</button>
                        <textarea id="jsonImport" style="width: 100%; height: 300px; margin-top: 10px;" placeholder="Вставьте JSON здесь..."></textarea>
                    </div>
                </div>
            `;

            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.id = 'adminModal';
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 900px;">
                    <span class="close" onclick="closeModal('adminModal')">&times;</span>
                    ${adminHtml}
                </div>
            `;
            document.body.appendChild(modal);
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            
            document.querySelector(`.admin-tab[onclick*="${tab}"]`).classList.add('active');
            document.getElementById(`admin${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
        }

        async function toggleUserBan(userId, ban) {
            try {
                const response = await fetch(`${API_URL}/admin/users/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.id}`
                    },
                    body: JSON.stringify({is_banned: ban})
                });

                const data = await response.json();
                alert(data.message);
                if (data.success) {
                    closeModal('adminModal');
                    showAdminPanel();
                }
            } catch (error) {
                alert('❌ Ошибка: ' + error);
            }
        }

        async function deleteUser(userId) {
            if (!confirm('Удалить пользователя и все его посты?')) return;

            try {
                const response = await fetch(`${API_URL}/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${currentUser.id}`
                    }
                });

                const data = await response.json();
                alert(data.message);
                if (data.success) {
                    closeModal('adminModal');
                    showAdminPanel();
                    loadPosts();
                }
            } catch (error) {
                alert('❌ Ошибка: ' + error);
            }
        }

        async function pinPost(postId, pin) {
            try {
                const response = await fetch(`${API_URL}/admin/posts/${postId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.id}`
                    },
                    body: JSON.stringify({is_pinned: pin})
                });

                const data = await response.json();
                alert(data.message);
                if (data.success) {
                    loadPosts();
                    if (document.getElementById('adminModal')) {
                        closeModal('adminModal');
                        showAdminPanel();
                    }
                }
            } catch (error) {
                alert('❌ Ошибка: ' + error);
            }
        }

        async function lockPost(postId, lock) {
            try {
                const response = await fetch(`${API_URL}/admin/posts/${postId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentUser.id}`
                    },
                    body: JSON.stringify({is_locked: lock})
                });

                const data = await response.json();
                alert(data.message);
                if (data.success) {
                    loadPosts();
                    if (document.getElementById('adminModal')) {
                        closeModal('adminModal');
                        showAdminPanel();
                    }
                }
            } catch (error) {
                alert('❌ Ошибка: ' + error);
            }
        }

 async function deletePost(postId) {
    if (!confirm('Удалить пост?')) return;

    try {
        const response = await fetch(`${API_URL}/admin/posts/${postId}`, {
            method: 'DELETE',
            headers: {
                'Authorization': `Bearer ${currentUser.id}`
            }
        });

        const data = await response.json();
        alert(data.message);
        
        if (data.success) {
            // ✅ Обновляем список постов
            await loadPosts();
            
            // ✅ Если открыта админ-панель, обновляем её
            if (document.getElementById('adminModal')) {
                closeModal('adminModal');
                showAdminPanel(); // Открываем заново
            }
        }
    } catch (error) {
        alert('❌ Ошибка: ' + error);
    }
}

        async function deleteAllPosts() {
            if (!confirm('ТОЧНО удалить ВСЕ посты?! Это необратимо!')) return;

            try {
                const response = await fetch(`${API_URL}/admin/posts`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${currentUser.id}`
                    }
                });

                const data = await response.json();
                alert(data.message);
                if (data.success) {
                    loadPosts();
                    closeModal('adminModal');
                }
            } catch (error) {
                alert('❌ Ошибка: ' + error);
            }
        }

        function exportJSON() {
            const dataStr = JSON.stringify(postsData, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `servotvet_backup_${new Date().toISOString()}.json`;
            a.click();
        }

        function importJSON() {
            const jsonStr = document.getElementById('jsonImport').value;
            try {
                const data = JSON.parse(jsonStr);
                console.log('Импортировано:', data);
                alert('JSON валиден! (функция импорта в БД пока не реализована)');
            } catch (e) {
                alert('❌ Неверный JSON: ' + e.message);
            }
        }
    </script>
